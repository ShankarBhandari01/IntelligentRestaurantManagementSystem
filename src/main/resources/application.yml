spring:
  application:
    name: intelligent-restaurant-management-system

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest


  resilience4j:
    circuitbreaker:
      instances:
        kotService:
          registerHealthIndicator: true
          slidingWindowSize: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s

    retry:
      instances:
        kotServiceRetry:
          maxAttempts: 3
          waitDuration: 2s


  docker:
    compose:
      enabled: false

  profiles:
    active: dev   # default profile, can be overridden with --spring.profiles.active=prod


server:
  servlet:
    context-path: /api/v1



---
# Dev profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/app_dev
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 3000

logging:
  level:
    root: DEBUG
    org.springframework: DEBUG

---
# Prod profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/app_prod
    username: postgre
    password: prod_pass
  jpa:
    hibernate:
      ddl-auto: validate   # safer in production
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 3000

logging:
  level:
    root: INFO
    org.springframework: WARN
