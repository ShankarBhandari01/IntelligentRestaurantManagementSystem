spring:
  application:
    name: intelligent-restaurant-management-system

---
spring:
  docker:
    compose:
      enabled: false

  profiles:
    active: dev   # default profile, can be overridden with --spring.profiles.active=prod

---
# Dev profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/app_dev
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
logging:
  level:
    root: DEBUG
    org.springframework: DEBUG

---
# Prod profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/app_prod
    username: postgre
    password: prod_pass
  jpa:
    hibernate:
      ddl-auto: validate   # safer in production
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
logging:
  level:
    root: INFO
    org.springframework: WARN
